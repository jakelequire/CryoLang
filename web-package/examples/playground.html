<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CryoLang Web Playground</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #1e1e1e;
      color: #ffffff;
      overflow: hidden;
    }

    .container {
      display: flex;
      height: 100vh;
      flex-direction: column;
    }

    .header {
      background-color: #252526;
      padding: 12px 20px;
      border-bottom: 1px solid #3e3e42;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: flex;
      align-items: center;
      font-size: 18px;
      font-weight: 600;
    }

    .logo::before {
      content: '❄️';
      margin-right: 8px;
      font-size: 20px;
    }

    .controls {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .btn {
      background-color: #0e639c;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      transition: background-color 0.2s;
    }

    .btn:hover {
      background-color: #1177bb;
    }

    .btn:disabled {
      background-color: #555;
      cursor: not-allowed;
    }

    .btn.secondary {
      background-color: #5a5a5a;
    }

    .btn.secondary:hover {
      background-color: #6a6a6a;
    }

    .main {
      display: flex;
      flex: 1;
      min-height: 0;
    }

    .editor-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .editor-toolbar {
      background-color: #2d2d30;
      padding: 8px 12px;
      border-bottom: 1px solid #3e3e42;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 13px;
    }

    .editor-container {
      flex: 1;
    }

    .output-panel {
      width: 400px;
      background-color: #252526;
      border-left: 1px solid #3e3e42;
      display: flex;
      flex-direction: column;
    }

    .output-tabs {
      background-color: #2d2d30;
      display: flex;
      border-bottom: 1px solid #3e3e42;
    }

    .output-tab {
      padding: 12px 16px;
      cursor: pointer;
      font-size: 13px;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }

    .output-tab.active {
      background-color: #1e1e1e;
      border-bottom-color: #0e639c;
    }

    .output-content {
      flex: 1;
      overflow: auto;
      padding: 12px;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 13px;
      line-height: 1.4;
    }

    .status-bar {
      background-color: #007acc;
      color: white;
      padding: 4px 12px;
      font-size: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .loading {
      opacity: 0.6;
      pointer-events: none;
    }

    .error {
      color: #f48771;
    }

    .warning {
      color: #ddb93b;
    }

    .success {
      color: #89d185;
    }

    .output-section {
      margin-bottom: 16px;
    }

    .output-section h4 {
      color: #569cd6;
      margin-bottom: 8px;
      font-size: 14px;
    }

    .output-section pre {
      background-color: #1e1e1e;
      padding: 8px;
      border-radius: 4px;
      overflow-x: auto;
      border: 1px solid #3e3e42;
    }

    .metrics {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 12px;
    }

    .metric {
      background-color: #1e1e1e;
      padding: 8px;
      border-radius: 4px;
      text-align: center;
      border: 1px solid #3e3e42;
    }

    .metric-value {
      font-size: 16px;
      font-weight: bold;
      color: #569cd6;
    }

    .metric-label {
      font-size: 11px;
      color: #cccccc;
      margin-top: 2px;
    }

    @media (max-width: 768px) {
      .main {
        flex-direction: column;
      }
      
      .output-panel {
        width: 100%;
        height: 300px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="logo">CryoLang Playground</div>
      <div class="controls">
        <select id="examples" class="btn secondary">
          <option value="">Load Example...</option>
          <option value="hello">Hello World</option>
          <option value="fibonacci">Fibonacci</option>
          <option value="struct">Structs & Functions</option>
          <option value="arrays">Arrays</option>
        </select>
        <button id="format-btn" class="btn secondary">Format (Shift+Alt+F)</button>
        <button id="compile-btn" class="btn">Compile (Ctrl+Enter)</button>
      </div>
    </header>

    <main class="main">
      <div class="editor-panel">
        <div class="editor-toolbar">
          <span>main.cryo</span>
          <span style="color: #888;">CryoLang</span>
        </div>
        <div id="editor" class="editor-container"></div>
      </div>

      <div class="output-panel">
        <div class="output-tabs">
          <div class="output-tab active" data-tab="output">Output</div>
          <div class="output-tab" data-tab="ast">AST</div>
          <div class="output-tab" data-tab="llvm">LLVM IR</div>
        </div>
        <div class="output-content">
          <div id="output-tab" class="tab-content">
            <div class="output-section">
              <h4>Ready to compile!</h4>
              <p>Write your CryoLang code and click "Compile" to see the results.</p>
            </div>
          </div>
          <div id="ast-tab" class="tab-content" style="display: none;"></div>
          <div id="llvm-tab" class="tab-content" style="display: none;"></div>
        </div>
      </div>
    </main>

    <div class="status-bar">
      <span id="status">Ready</span>
      <span id="position">Line 1, Column 1</span>
    </div>
  </div>

  <!-- Load Monaco Editor -->
  <script src="https://unpkg.com/monaco-editor@0.45.0/min/vs/loader.js"></script>
  
  <script>
    // Sample code examples
    const examples = {
      hello: `fn main() -> int {
    println("Hello, CryoLang!");
    return 0;
}`,
      
      fibonacci: `fn fibonacci(n: int) -> int {
    if n <= 1 {
        return n;
    }
    return fibonacci(n - 1) + fibonacci(n - 2);
}

fn main() -> int {
    for i in 0..10 {
        println("fibonacci({}) = {}", i, fibonacci(i));
    }
    return 0;
}`,

      struct: `struct Point {
    x: float,
    y: float
}

impl Point {
    fn new(x: float, y: float) -> Point {
        return Point { x: x, y: y };
    }
    
    fn distance_from_origin(&self) -> float {
        return sqrt(self.x * self.x + self.y * self.y);
    }
}

fn main() -> int {
    let p = Point::new(3.0, 4.0);
    println("Distance from origin: {}", p.distance_from_origin());
    return 0;
}`,

      arrays: `fn main() -> int {
    let numbers: [int; 5] = [1, 2, 3, 4, 5];
    let mut sum = 0;
    
    for i in 0..5 {
        sum += numbers[i];
    }
    
    println("Sum of array: {}", sum);
    
    // Dynamic array
    let mut dynamic: Vec<int> = Vec::new();
    dynamic.push(10);
    dynamic.push(20);
    dynamic.push(30);
    
    println("Dynamic array size: {}", dynamic.len());
    return 0;
}`
    };

    let playground = null;
    let currentTab = 'output';

    // Initialize Monaco and CryoLang compiler
    require.config({ paths: { vs: 'https://unpkg.com/monaco-editor@0.45.0/min/vs' } });
    require(['vs/editor/editor.main'], async function () {
      try {
        // Initialize the playground (this would normally import from the package)
        document.getElementById('status').textContent = 'Loading compiler...';
        
        // For demo purposes, we'll simulate the playground functionality
        const editor = monaco.editor.create(document.getElementById('editor'), {
          value: examples.hello,
          language: 'javascript', // Using JavaScript syntax highlighting for demo
          theme: 'vs-dark',
          automaticLayout: true,
          minimap: { enabled: false },
          fontSize: 14,
          lineHeight: 21,
          fontFamily: '"Fira Code", "Consolas", "Monaco", monospace'
        });

        // Simulate playground object
        playground = {
          editor,
          async compile() {
            const source = editor.getValue();
            
            // Simulate compilation
            document.getElementById('status').textContent = 'Compiling...';
            await new Promise(resolve => setTimeout(resolve, 800));
            
            return {
              success: true,
              wasm: new Uint8Array([0, 97, 115, 109, 1, 0, 0, 0]), // Mock WASM
              javascript: `// Generated JavaScript\\nconsole.log("Compiled from CryoLang");`,
              llvmIR: `; Generated LLVM IR\\ndefine i32 @main() {\\n  ret i32 0\\n}`,
              ast: {
                type: 'Program',
                functions: [
                  {
                    type: 'Function',
                    name: 'main',
                    returnType: 'int',
                    body: { type: 'Block', statements: [] }
                  }
                ]
              },
              metrics: {
                compilationTime: Math.random() * 100 + 50,
                memoryUsage: Math.random() * 1000 + 500,
                linesOfCode: source.split('\\n').length,
                astNodeCount: Math.floor(Math.random() * 50) + 20,
                outputSize: Math.floor(Math.random() * 2000) + 1000
              }
            };
          },
          
          async format() {
            document.getElementById('status').textContent = 'Formatting...';
            await new Promise(resolve => setTimeout(resolve, 200));
            // Monaco's built-in formatting for demo
            await editor.getAction('editor.action.formatDocument').run();
            document.getElementById('status').textContent = 'Ready';
          }
        };

        // Update position indicator
        editor.onDidChangeCursorPosition((e) => {
          document.getElementById('position').textContent = 
            `Line ${e.position.lineNumber}, Column ${e.position.column}`;
        });

        document.getElementById('status').textContent = 'Ready';
        document.querySelector('.container').classList.remove('loading');

      } catch (error) {
        document.getElementById('status').textContent = `Error: ${error.message}`;
        console.error('Failed to initialize playground:', error);
      }
    });

    // Event handlers
    document.getElementById('compile-btn').addEventListener('click', async () => {
      if (!playground) return;
      
      const button = document.getElementById('compile-btn');
      button.disabled = true;
      button.textContent = 'Compiling...';
      
      try {
        const result = await playground.compile();
        displayCompileResult(result);
        document.getElementById('status').textContent = 
          result.success ? 'Compilation successful' : 'Compilation failed';
      } catch (error) {
        displayError('Compilation Error', error.message);
        document.getElementById('status').textContent = 'Compilation failed';
      } finally {
        button.disabled = false;
        button.textContent = 'Compile';
      }
    });

    document.getElementById('format-btn').addEventListener('click', async () => {
      if (!playground) return;
      await playground.format();
    });

    document.getElementById('examples').addEventListener('change', (e) => {
      const example = e.target.value;
      if (example && examples[example] && playground) {
        playground.editor.setValue(examples[example]);
      }
      e.target.value = '';
    });

    // Tab switching
    document.querySelectorAll('.output-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        const tabName = tab.dataset.tab;
        switchTab(tabName);
      });
    });

    function switchTab(tabName) {
      // Update active tab
      document.querySelectorAll('.output-tab').forEach(t => t.classList.remove('active'));
      document.querySelector(`[data-tab="${tabName}"]`).classList.add('active');
      
      // Show corresponding content
      document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
      document.getElementById(`${tabName}-tab`).style.display = 'block';
      
      currentTab = tabName;
    }

    function displayCompileResult(result) {
      if (result.success) {
        // Output tab
        document.getElementById('output-tab').innerHTML = `
          <div class="output-section">
            <h4 class="success">✓ Compilation Successful</h4>
            <div class="metrics">
              <div class="metric">
                <div class="metric-value">${result.metrics.compilationTime.toFixed(1)}ms</div>
                <div class="metric-label">Compile Time</div>
              </div>
              <div class="metric">
                <div class="metric-value">${result.metrics.memoryUsage.toFixed(0)}KB</div>
                <div class="metric-label">Memory Used</div>
              </div>
              <div class="metric">
                <div class="metric-value">${result.metrics.linesOfCode}</div>
                <div class="metric-label">Lines of Code</div>
              </div>
              <div class="metric">
                <div class="metric-value">${result.metrics.outputSize}B</div>
                <div class="metric-label">Output Size</div>
              </div>
            </div>
          </div>
          <div class="output-section">
            <h4>Generated JavaScript</h4>
            <pre>${escapeHtml(result.javascript)}</pre>
          </div>
        `;

        // AST tab
        document.getElementById('ast-tab').innerHTML = `
          <div class="output-section">
            <h4>Abstract Syntax Tree</h4>
            <pre>${escapeHtml(JSON.stringify(result.ast, null, 2))}</pre>
          </div>
        `;

        // LLVM tab
        document.getElementById('llvm-tab').innerHTML = `
          <div class="output-section">
            <h4>LLVM IR Output</h4>
            <pre>${escapeHtml(result.llvmIR)}</pre>
          </div>
        `;
      } else {
        displayError('Compilation Failed', result.errors?.map(e => e.message).join('\\n') || 'Unknown error');
      }
    }

    function displayError(title, message) {
      document.getElementById('output-tab').innerHTML = `
        <div class="output-section">
          <h4 class="error">✗ ${title}</h4>
          <pre class="error">${escapeHtml(message)}</pre>
        </div>
      `;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if (e.ctrlKey && e.key === 'Enter') {
        e.preventDefault();
        document.getElementById('compile-btn').click();
      } else if (e.shiftKey && e.altKey && e.key === 'F') {
        e.preventDefault();
        document.getElementById('format-btn').click();
      }
    });

    // Initial loading state
    document.querySelector('.container').classList.add('loading');
  </script>
</body>
</html>
