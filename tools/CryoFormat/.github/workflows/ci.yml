name: CryoFormat CI

on:
  push:
    branches: [ main, develop ]
    paths: [ 'tools/CryoFormat/**' ]
  pull_request:
    branches: [ main ]
    paths: [ 'tools/CryoFormat/**' ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy
    
    - name: Cache cargo registry
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          tools/CryoFormat/target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Check formatting
      working-directory: tools/CryoFormat
      run: cargo fmt --check
    
    - name: Run clippy
      working-directory: tools/CryoFormat
      run: cargo clippy -- -D warnings
    
    - name: Run tests
      working-directory: tools/CryoFormat
      run: cargo test --verbose
    
    - name: Run integration tests
      working-directory: tools/CryoFormat
      run: cargo test --test integration_tests
  
  build:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
    
    - name: Build
      working-directory: tools/CryoFormat
      run: cargo build --release
    
    - name: Test binary
      working-directory: tools/CryoFormat
      run: |
        echo "const x:int=42;" > test.cryo
        ./target/release/cryofmt test.cryo || ./target/release/cryofmt.exe test.cryo
        cat test.cryo
    
    - name: Upload binary
      uses: actions/upload-artifact@v3
      with:
        name: cryofmt-${{ matrix.os }}
        path: |
          tools/CryoFormat/target/release/cryofmt
          tools/CryoFormat/target/release/cryofmt.exe
  
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
    
    - name: Install cargo-tarpaulin
      run: cargo install cargo-tarpaulin
    
    - name: Run coverage
      working-directory: tools/CryoFormat
      run: cargo tarpaulin --out xml
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: tools/CryoFormat/cobertura.xml
        flags: cryoformat